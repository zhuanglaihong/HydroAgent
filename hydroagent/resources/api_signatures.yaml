# HydroModel API Signatures and Documentation
# 用于 RAG 系统的知识库 - hydromodel 函数签名和使用说明

calibrate:
  module: hydromodel.trainers.unified_calibrate
  function: calibrate
  signature: "calibrate(config_path: str) -> Dict[str, Any]"
  description: |
    Calibrate hydrological model parameters using specified optimization algorithm.
    使用指定的优化算法率定水文模型参数。

  parameters:
    config_path:
      type: str
      description: Path to YAML configuration file
      required: true

  returns:
    type: Dict[str, Any]
    description: Calibration results including optimal parameters and metrics

  config_requirements:
    - model_name: Model identifier (xaj, gr4j, etc.)
    - basin_id: Basin identifier
    - train_period: Training time period [start, end]
    - training_cfgs: Optimization algorithm configuration

  example: |
    from hydromodel.trainers.unified_calibrate import calibrate

    result = calibrate("config.yaml")
    print(f"NSE: {result['nse']}")
    print(f"Optimal params: {result['params']}")

  output_files:
    - calibration_results.json: "JSON file with calibration metrics and parameters"
    - "{basin_id}_sceua.csv": "SCE-UA iteration history (if using SCE_UA)"
    - "{basin_id}_ga.csv": "GA generation history (if using GA)"

evaluate:
  module: hydromodel.trainers.unified_evaluate
  function: evaluate
  signature: "evaluate(config_path: str) -> Dict[str, Any]"
  description: |
    Evaluate model performance on test data with fixed parameters.
    使用固定参数在测试数据上评估模型性能。

  parameters:
    config_path:
      type: str
      description: Path to YAML configuration file
      required: true

  returns:
    type: Dict[str, Any]
    description: Evaluation results with performance metrics

  config_requirements:
    - model_name: Model identifier
    - basin_id: Basin identifier
    - test_period: Testing time period [start, end]
    - parameters: Fixed model parameters (from calibration)

  example: |
    from hydromodel.trainers.unified_evaluate import evaluate

    result = evaluate("config.yaml")
    print(f"Test NSE: {result['nse']}")

models:
  xaj:
    name: "Xinanjiang Model"
    description: "Chinese conceptual hydrological model with 15 parameters"
    parameters:
      - K: "Outflow coefficient"
      - B: "Exponent of tension water capacity curve"
      - IM: "Ratio of impervious to total area"
      - WM: "Tension water capacity"
      - WUM: "Upper layer tension water capacity"
      - WLM: "Lower layer tension water capacity"
      - C: "Deep layer evaporation coefficient"
      - EX: "Exponent of free water capacity curve"
      - SM: "Free water capacity"
      - KG: "Outflow coefficient of groundwater"
      - KSS: "Outflow coefficient of interflow"
      - KKG: "Recession constant of groundwater"
      - KKSS: "Recession constant of interflow"
      - XE: "Muskingum parameter"
      - KE: "Muskingum parameter"

  gr4j:
    name: "GR4J Model"
    description: "French lumped daily rainfall-runoff model with 4 parameters"
    parameters:
      - X1: "Production store capacity (mm)"
      - X2: "Groundwater exchange coefficient (mm)"
      - X3: "Routing store capacity (mm)"
      - X4: "Unit hydrograph time base (days)"

  gr5j:
    name: "GR5J Model"
    description: "GR4J extended with 5th parameter for snow/interception"
    parameters:
      - X1: "Production store capacity (mm)"
      - X2: "Groundwater exchange coefficient (mm)"
      - X3: "Routing store capacity (mm)"
      - X4: "Unit hydrograph time base (days)"
      - X5: "Interception capacity (mm)"

  gr6j:
    name: "GR6J Model"
    description: "GR5J extended with 6th parameter for groundwater exchange"
    parameters:
      - X1: "Production store capacity (mm)"
      - X2: "Groundwater exchange coefficient (mm)"
      - X3: "Routing store capacity (mm)"
      - X4: "Unit hydrograph time base (days)"
      - X5: "Interception capacity (mm)"
      - X6: "Exponential store coefficient"

algorithms:
  SCE_UA:
    name: "Shuffled Complex Evolution"
    description: "Global optimization algorithm by Duan et al. (1992)"
    parameters:
      ngs:
        description: "Number of complexes"
        default: 7
        recommended: "2-20, depending on problem dimension"

      npg:
        description: "Number of points in each complex"
        default: "2n+1 where n is number of parameters"
        recommended: "At least 2n+1"

      npt:
        description: "Number of points in each sub-complex"
        default: "n+1 where n is number of parameters"
        recommended: "n+1 to 2n+1"

      rep:
        description: "Number of evolution steps before shuffling"
        default: 5
        recommended: "5-10 for most problems"

      maxn:
        description: "Maximum function evaluations"
        default: 10000
        recommended: "1000 * n for simple problems, 10000 * n for complex"

    best_practices:
      - "Start with ngs=7, rep=5 for initial calibration"
      - "Increase maxn if convergence not achieved"
      - "Monitor {basin_id}_sceua.csv for convergence behavior"
      - "Check if parameters hit boundaries (boundary effect)"

  GA:
    name: "Genetic Algorithm"
    description: "Evolutionary optimization algorithm"
    parameters:
      pop_size:
        description: "Population size"
        default: 50
        recommended: "10 * n where n is number of parameters"

      max_generations:
        description: "Maximum number of generations"
        default: 100
        recommended: "50-200 depending on problem complexity"

      crossover_prob:
        description: "Crossover probability"
        default: 0.8
        recommended: "0.7-0.9"

      mutation_prob:
        description: "Mutation probability"
        default: 0.1
        recommended: "0.01-0.2"

  scipy:
    name: "SciPy Optimization"
    description: "Various scipy.optimize methods"
    methods:
      - "L-BFGS-B: Bounded quasi-Newton method"
      - "TNC: Truncated Newton method"
      - "SLSQP: Sequential Least Squares Programming"

data_structure:
  calibration_results_json:
    description: "JSON output from calibrate() function"
    structure:
      nse: "Nash-Sutcliffe Efficiency"
      rmse: "Root Mean Square Error"
      parameters: "Dictionary of optimal parameter values"
      convergence: "Boolean indicating convergence status"
      iterations: "Number of iterations performed"

  sceua_csv:
    description: "CSV file tracking SCE-UA optimization progress"
    columns:
      - iteration: "Iteration number"
      - objective_value: "Objective function value (negative NSE)"
      - param_1: "Value of first parameter"
      - param_2: "Value of second parameter"
      - "...": "Additional parameter columns"

    usage: |
      Use this file to:
      - Monitor convergence behavior
      - Detect boundary effects
      - Calculate variance in final iterations
      - Identify parameter sensitivity

common_errors:
  KeyError_prec:
    error: "KeyError: 'prec'"
    cause: "Incorrect variable name in data access"
    solution: "Use 'prcp' or 'precipitation' instead of 'prec'"

  FileNotFoundError_data:
    error: "FileNotFoundError: datasets-origin path"
    cause: "Data path not configured correctly"
    solution: "Verify datasets-origin path in config points to valid directory"

  ValueError_date:
    error: "ValueError: time data does not match format"
    cause: "Invalid date format in time period"
    solution: "Use YYYY-MM-DD format (e.g., '2000-01-01')"

  numerical_instability:
    error: "RuntimeWarning: invalid value encountered"
    cause: "Parameter values causing numerical issues"
    solution: |
      - Check parameter ranges are reasonable
      - Increase warmup period
      - Verify input data quality

tips:
  parameter_ranges:
    description: "Guidelines for setting parameter ranges"
    recommendations:
      - "Use physically meaningful ranges based on literature"
      - "Start with wide ranges, then refine based on results"
      - "Monitor for boundary effects and expand as needed"
      - "GR4J typical ranges:"
      - "  X1: [100, 1500] mm"
      - "  X2: [-5, 5] mm"
      - "  X3: [20, 500] mm"
      - "  X4: [0.5, 4.0] days"

  warmup_period:
    description: "Importance of model warmup"
    recommendations:
      - "Minimum 365 days (1 year) for GR models"
      - "365-730 days for XAJ model"
      - "Longer warmup for models with deep groundwater"
      - "Warmup removes initial condition uncertainty"

  convergence_diagnosis:
    description: "How to check if calibration converged"
    steps:
      - "Examine {basin_id}_sceua.csv"
      - "Calculate variance of last 10% of iterations"
      - "Variance < 0.001 indicates good convergence"
      - "If not converged: increase maxn or rep"
      - "Check for parameter boundary effects"
