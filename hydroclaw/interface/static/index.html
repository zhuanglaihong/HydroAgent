<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HydroClaw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css?v=20">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body data-theme="light">

<aside id="sidebar">
  <div id="sidebar-header">
    <div id="logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M12 2C6 8 3 13 3 16a9 9 0 0018 0c0-3-3-8-9-14z"/>
      </svg>
      <span>HydroClaw</span>
    </div>
    <button id="sidebar-collapse-btn" title="折叠侧边栏"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
  </div>
  <div id="sidebar-body">
    <!-- Scrollable top: token + history -->
    <div id="sidebar-scroll">
      <div id="token-row-top">
        <div class="token-row">
          <span class="token-label">Token 用量</span>
          <span class="token-val" id="token-display">0</span>
        </div>
        <div id="token-bar-wrap"><div id="token-bar" style="width:0%"></div></div>
      </div>

      <!-- History section -->
      <div class="s-section">
        <div class="s-label">历史对话</div>
        <div id="session-list"></div>
      </div>
    </div>

    <!-- Fixed bottom: system + config (never scroll away) -->
    <div id="sidebar-fixed">
      <div class="s-label">系统</div>
      <div class="s-nav-item" onclick="openPagePanel('skills')">
        <span class="s-nav-label">技能</span>
        <span class="s-count" id="sd-skills-count"></span>
        <span class="s-nav-arrow">›</span>
      </div>
      <div class="s-nav-item" onclick="openPagePanel('tools')">
        <span class="s-nav-label">工具</span>
        <span class="s-count" id="sd-tools-count"></span>
        <span class="s-nav-arrow">›</span>
      </div>
      <div class="s-nav-item" onclick="openPagePanel('packages')">
        <span class="s-nav-label">水文包</span>
        <span class="s-count" id="sd-packages-count"></span>
        <span class="s-nav-arrow">›</span>
      </div>
      <div class="s-nav-item" onclick="openPagePanel('knowledge')">
        <span class="s-nav-label">知识库</span>
        <span class="s-count" id="sd-knowledge-count"></span>
        <span class="s-nav-arrow">›</span>
      </div>
      <div class="s-nav-item" onclick="openPagePanel('memory')">
        <span class="s-nav-label">记忆</span>
        <span class="s-count" id="sd-memory-count"></span>
        <span class="s-nav-arrow">›</span>
      </div>

      <div class="s-label">配置</div>
      <div class="s-nav-item" onclick="openPagePanel('datasets')">
        <span class="s-nav-label">数据集</span>
        <span class="s-nav-arrow">›</span>
      </div>
      <div class="s-nav-item" onclick="openPagePanel('config')">
        <span class="s-nav-label">模型配置</span>
        <span class="s-nav-arrow">›</span>
      </div>
    </div>
  </div>
  <div id="sidebar-footer">
    <button id="new-chat-btn">+ 新对话</button>
  </div>
</aside>

<main id="main">
  <!-- Persistent header (always visible across chat/panel views) -->
  <div id="chat-header">
    <div id="chat-title">HydroClaw — 水文模型智能率定</div>
    <div id="header-right">
      <span id="conn-dot"></span>
      <span id="conn-label">连接中...</span>
      <button id="theme-btn">深色</button>
    </div>
  </div>
  <!-- Chat view (default) -->
  <div id="chat-view">
    <div id="messages-wrap"></div>
    <div id="ask-user-bar" style="display:none">
      <div id="ask-user-q"></div>
      <div id="ask-user-form">
        <input type="text" id="ask-user-input" placeholder="请输入回答...">
        <button id="ask-user-submit">提交</button>
      </div>
    </div>
    <div id="input-area">
      <div id="status-row">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">待命</span>
        <span id="elapsed-timer" style="display:none"></span>
        <button id="stop-btn" onclick="sendStop()">停止</button>
      </div>
      <div id="input-row">
        <textarea id="input" rows="2" placeholder="输入问题（例：率定GR4J模型，流域12025000）"></textarea>
        <button id="send-btn" onclick="sendQuery()">发送</button>
      </div>
    </div>
  </div>
  <!-- Panel view (replaces chat when a sidebar item is clicked) -->
  <div id="panel-view">
    <div id="panel-view-header">
      <div id="panel-view-title"></div>
      <div id="panel-view-subtitle"></div>
    </div>
    <div id="panel-view-body"></div>
  </div>
</main>

<aside id="exec-panel">
  <div id="exec-header">
    <span id="exec-title">执行日志</span>
    <button id="exec-collapse-btn" title="折叠执行面板"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg></button>
  </div>
  <div id="exec-log">
    <div id="exec-empty">暂无执行记录</div>
  </div>
</aside>


<div id="create-skill-modal" onclick="closeCreateSkillModal(event)">
  <div id="create-skill-box">
    <div id="create-skill-header">
      <span id="create-skill-title">创建新技能</span>
      <button onclick="closeCreateSkillModal()">✕</button>
    </div>
    <p id="create-skill-subtitle">描述你想要的技能，HydroClaw 将自动生成工作流模板</p>
    <label class="cs-label">技能名称</label>
    <input type="text" id="cs-name" placeholder="例：洪水频率分析">
    <label class="cs-label">功能描述</label>
    <textarea id="cs-desc" rows="3" placeholder="例：自动计算指定流域的洪水重现期，生成频率曲线图，输出 2/5/10/50/100 年一遇的洪峰流量"></textarea>
    <label class="cs-label">适用场景（可选）</label>
    <input type="text" id="cs-when" placeholder="例：需要做防洪设计或水资源规划时">
    <div id="create-skill-footer">
      <button class="modal-btn modal-btn-secondary" onclick="closeCreateSkillModal()">取消</button>
      <button class="modal-btn modal-btn-primary" onclick="submitCreateSkill()">创建技能</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src="" alt=""></div>

<script src="/static/app.js?v=20"></script>
</body>
</html>
